# Generic Stage-2 template: connector + LoRA visual instruction tuning.
# Point train_data_path / image_dir at your own LLaVA-format data and stage1_checkpoint at a
# trained Stage-1 connector, then: python train.py --config configs/finetune_stage2.yaml
# For the astronomy run, use configs/finetune_astrollava_stage2.yaml instead.
vision_encoder:
  model_name: openai/clip-vit-large-patch14
  select_layer: -2
  select_feature: patch
language_model:
  model_name: Qwen/Qwen2.5-1.5B-Instruct
  torch_dtype: bfloat16
  lora:
    r: 16
    lora_alpha: 32
    lora_dropout: 0.05
    target_modules: [q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj]
connector:
  vision_hidden_size: 1024
  llm_hidden_size: 1536
stage1_checkpoint: ./checkpoints/sample-stage1/checkpoint-1   # trained Stage-1 connector dir
data:
  train_data_path: datasets/llava_recap_558k/train.json
  image_dir: datasets/llava_recap_558k/images
  max_length: 512
training:
  stage: 2
  output_dir: ./checkpoints/sample-stage2
  num_epochs: 1
  per_device_batch_size: 1
  gradient_accumulation_steps: 1
  gradient_checkpointing: true
  learning_rate: 0.0002
  warmup_ratio: 0.03
  weight_decay: 0.0
  max_grad_norm: 1.0
  bf16: true
  dataloader_num_workers: 0
  logging_steps: 1
  save_steps: 1
  seed: 42
