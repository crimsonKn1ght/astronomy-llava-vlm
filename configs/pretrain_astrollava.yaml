# Stage-1 connector alignment on AstroLLaVA_convos (real astronomy image -> text).
# Build the data first:
#   python scripts/build_astrollava_trainset.py --output-dir datasets/astrollava_llava
# Then train:
#   python train.py --config configs/pretrain_astrollava.yaml
vision_encoder:
  model_name: openai/clip-vit-large-patch14
  select_layer: -2
  select_feature: patch
language_model:
  model_name: Qwen/Qwen2.5-1.5B-Instruct
  torch_dtype: bfloat16
connector:
  vision_hidden_size: 1024
  llm_hidden_size: 1536
data:
  train_data_path: datasets/astrollava_llava/train.json
  image_dir: datasets/astrollava_llava/images
  max_length: 512          # +256 image tokens -> ~768 effective seq. 768 here OOMs the fp32 loss
training:
  output_dir: ./checkpoints/astrollava-stage1
  num_epochs: 3            # ~30k pairs, connector-only
  per_device_batch_size: 8     # full-length captions + 152k-vocab fp32 loss OOM at 16; 8 is safe (~27 GB)
  gradient_accumulation_steps: 16  # effective batch = 128 (unchanged)
  learning_rate: 0.001     # connector-only
  warmup_ratio: 0.03
  weight_decay: 0.0
  max_grad_norm: 1.0
  bf16: true               # requires an Ampere-or-newer GPU (RTX 30xx/40xx, A-series)
  dataloader_num_workers: 8
  logging_steps: 10
  save_steps: 100
  seed: 42
