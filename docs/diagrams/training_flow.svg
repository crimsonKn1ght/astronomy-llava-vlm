<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="580" viewBox="0 0 1120 580" role="img" aria-labelledby="title desc">
  <title id="title">AstroLLaVA Stage 2 training flow</title>
  <desc id="desc">Stage 2 warm-starts the Stage 1 connector, trains connector plus LoRA adapters on the same train split, evaluates on the held-out split, and packages checkpoint 2526.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .title { fill: #0f172a; font: 700 28px Arial, sans-serif; }
      .subtitle { fill: #475569; font: 400 15px Arial, sans-serif; }
      .label { fill: #0f172a; font: 700 16px Arial, sans-serif; }
      .small { fill: #334155; font: 400 13px Arial, sans-serif; }
      .tiny { fill: #475569; font: 400 12px Arial, sans-serif; }
      .data { fill: #ede9fe; stroke: #7c3aed; stroke-width: 2; }
      .frozen { fill: #dbeafe; stroke: #2563eb; stroke-width: 2; }
      .trainable { fill: #d1fae5; stroke: #059669; stroke-width: 2; }
      .loss { fill: #fef3c7; stroke: #d97706; stroke-width: 2; }
      .checkpoint { fill: #fce7f3; stroke: #db2777; stroke-width: 2; }
      .line { stroke: #334155; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .soft-line { stroke: #64748b; stroke-width: 2; fill: none; marker-end: url(#arrow); stroke-dasharray: 6 6; }
    </style>
  </defs>

  <rect class="bg" width="1120" height="580" rx="24"/>
  <text class="title" x="40" y="48">AstroLLaVA Stage 2 Training Flow</text>
  <text class="subtitle" x="40" y="75">Warm-start the Stage 1 connector, train LoRA adapters with the connector, and validate on the same held-out split.</text>

  <rect class="data" x="45" y="130" width="170" height="102" rx="14"/>
  <text class="label" x="130" y="163" text-anchor="middle">Stage 1 data</text>
  <text class="small" x="130" y="188" text-anchor="middle">train.json + images</text>
  <text class="small" x="130" y="209" text-anchor="middle">test.json held out</text>

  <rect class="checkpoint" x="45" y="315" width="170" height="92" rx="14"/>
  <text class="label" x="130" y="348" text-anchor="middle">Stage 1</text>
  <text class="label" x="130" y="369" text-anchor="middle">connector</text>
  <text class="small" x="130" y="390" text-anchor="middle">checkpoint-3789</text>

  <rect class="trainable" x="300" y="180" width="205" height="112" rx="14"/>
  <text class="label" x="402" y="214" text-anchor="middle">Stage 2 train</text>
  <text class="small" x="402" y="238" text-anchor="middle">connector + LoRA</text>
  <text class="small" x="402" y="259" text-anchor="middle">1 epoch, 2526 steps</text>

  <rect class="frozen" x="300" y="360" width="205" height="92" rx="14"/>
  <text class="label" x="402" y="393" text-anchor="middle">Frozen modules</text>
  <text class="small" x="402" y="418" text-anchor="middle">CLIP + Qwen base</text>

  <rect class="loss" x="590" y="180" width="190" height="112" rx="14"/>
  <text class="label" x="685" y="214" text-anchor="middle">Held-out eval</text>
  <text class="small" x="685" y="238" text-anchor="middle">answer-token loss</text>
  <text class="small" x="685" y="259" text-anchor="middle">generation metrics</text>

  <rect class="checkpoint" x="865" y="180" width="210" height="112" rx="14"/>
  <text class="label" x="970" y="214" text-anchor="middle">Stage 2 release</text>
  <text class="small" x="970" y="238" text-anchor="middle">checkpoint-2526</text>
  <text class="small" x="970" y="259" text-anchor="middle">connector + lora zip</text>

  <path class="line" d="M215 181 H290"/>
  <path class="line" d="M215 361 C245 361 260 260 290 245"/>
  <path class="line" d="M505 236 H580"/>
  <path class="line" d="M780 236 H855"/>
  <path class="soft-line" d="M402 360 V304"/>
  <path class="soft-line" d="M685 292 V330 C685 355 730 355 760 330"/>

  <text class="tiny" x="252" y="169" text-anchor="middle">training records</text>
  <text class="tiny" x="258" y="350" text-anchor="middle">warm start</text>
  <text class="tiny" x="545" y="222" text-anchor="middle">checkpoints</text>
  <text class="tiny" x="818" y="222" text-anchor="middle">package</text>

  <g transform="translate(40,510)">
    <rect class="data" x="0" y="0" width="24" height="16" rx="4"/>
    <text class="tiny" x="34" y="13">Data / input</text>
    <rect class="frozen" x="150" y="0" width="24" height="16" rx="4"/>
    <text class="tiny" x="184" y="13">Frozen weights</text>
    <rect class="trainable" x="330" y="0" width="24" height="16" rx="4"/>
    <text class="tiny" x="364" y="13">Trainable weights</text>
    <rect class="loss" x="535" y="0" width="24" height="16" rx="4"/>
    <text class="tiny" x="569" y="13">Loss / eval</text>
    <rect class="checkpoint" x="690" y="0" width="24" height="16" rx="4"/>
    <text class="tiny" x="724" y="13">Checkpoint / release</text>
  </g>
</svg>
